<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTH - Möbel Transport Hessen</title>
    <meta name="description"
          content="Umzüge, Entrümpelung, Transport">
    <link rel="icon" type="image/jpg" href="MTH Logo 2026.jpg">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #ffffff;
            color: #333;
        }

        /* Logo als Banner */
        .logo {
            width: 100%;
            overflow: hidden; /* Verhindert Scrollbars */
            background-color: #f5f5f5; /* Optionaler Hintergrund */
        }

        .logo img {
            width: 100%;
            height: auto;
            display: block;
            max-width: none; /* Entfernt Desktop-Beschränkung */
        }

        .container {
            max-width: 700px;
            margin: 20px auto;
            padding: 0 10px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .services a {
            display: block;
            margin: 15px 0;
            font-size: 40px;
            text-decoration: none;
            color: #0056b3;
            font-weight: bold;
        }

        .services a:hover {
            text-decoration: underline;
        }

        .contact {
            margin-top: 40px;
        }

        .contact a {
            color: #0056b3;
            text-decoration: none;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        /* Mobile Optimierung */
        @media (max-width: 768px) {
            .container {
                padding: 0 5px;
            }

            .services a {
                font-size: 18px;
            }

            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <!-- Logo als breites Banner -->
    <div class="logo">
        <img src="MTH Logo 2026 1 (2).jpg" alt="MTH Möbel Transport Hessen Logo">
    </div>

    <div class="container">
        <h2>MTH Möbel Transport Hessen</h2>

        <div class="services">
            <a href="umzuege.html">Umzüge</a>
            <a href="Entruempelung.html">Entrümpelung</a>
            <a href="Transport_und_Kurier.html">Transport und Kurier</a>
        </div>

        <div class="contact">
            <h2>Kontakt</h2>
            <h3><a href="tel:+4915201377240">01520 1377240</a></h3>
            <h3><a href="mailto:v.st.stanchev@gmail.com">v.st.stanchev@gmail.com</a></h3>
        </div>
    </div>

</body>
</html>
